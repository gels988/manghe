<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味填读数挑战</title>
    <meta name="description" content="MAYI 142857 LAB: 九宫格本地通道转换调试页面">

    <style>
        :root{
            --primary:#2c3e50;
            --accent:#3498db;
            --bg:#f5f6fa;
            --card:#ffffff;
            --text:#2d3436;
            --muted:#bdc3c7;
            --danger:#e74c3c;
            --success:#2ecc71;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background:var(--bg);
            color:var(--text);
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .app-container{
            width:100%;
            max-width:480px;
            background:var(--card);
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            overflow:hidden;
            margin:10px;
            position:relative;
        }

        .camouflage-header{
            background:var(--primary);
            color:white;
            padding:15px;
            text-align:center;
            font-weight:bold;
            letter-spacing:2px;
            font-size:1.1em;
            position:relative;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .header-top{
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .header-links{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:10px;
            letter-spacing:0;
        }

        .header-subtitle{
            margin-top:4px;
            font-size:12px;
            font-weight:500;
            letter-spacing:0.2px;
            color:rgba(255,255,255,0.82);
        }

        .header-link{
            background:transparent;
            border:1px solid rgba(255,255,255,0.35);
            color:rgba(255,255,255,0.9);
            padding:4px 10px;
            border-radius:999px;
            font-size:0.75em;
            cursor:pointer;
        }

        .header-link:hover{
            background:rgba(255,255,255,0.08);
        }

        .status-indicator{
            position:absolute;
            top:50%;
            right:20px;
            transform:translateY(-50%);
            width:10px;
            height:10px;
            border-radius:50%;
            background-color:#bdc3c7;
            box-shadow:0 0 8px rgba(0,0,0,0.2);
            transition:background-color 0.3s;
        }

        /* 九宫格 */
        .grid-container{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:1px;
            background:#dfe4ea;
            border-bottom:1px solid #dfe4ea;
        }

        .grid-item{
            background:var(--card);
            padding:24px 5px;
            text-align:center;
            font-size:1.6em;
            font-weight:bold;
            color:var(--primary);
            cursor:pointer;
            transition:all 0.2s;
            user-select:none;
            min-height:88px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .grid-item:hover{
            background:#f1f2f6;
        }

        .grid-item.active{
            background:#e3f2fd;
            color:var(--accent);
            border:2px solid var(--accent);
            box-sizing:border-box;
        }

        /* 空白格 */
        .grid-item.empty{
            background:#fafafa;
            color:transparent;
            cursor:default;
            border:2px dashed #eee;
        }

        .grid-item.empty:hover{
            background:#fafafa;
        }

        .main-content{
            padding:20px;
            position:relative;
        }

        .overlay{
            position:absolute;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(5px);
            z-index:10;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .overlay h2{
            margin:0 0 10px 0;
            color:var(--primary);
        }

        .overlay p{
            color:var(--muted);
            margin-bottom:20px;
            font-size:0.9em;
        }

        .btn{
            background:var(--primary);
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
            font-size:0.9em;
        }

        .btn:hover{
            background:#1a252f;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-size:0.85em;
            font-weight:600;
            color:var(--muted);
        }

        textarea{
            width:100%;
            padding:12px;
            border:1px solid #dfe4ea;
            border-radius:6px;
            font-size:0.95em;
            box-sizing:border-box;
            resize:none;
            font-family:inherit;
        }

        textarea:focus{
            outline:2px solid var(--accent);
            border-color:transparent;
        }

        .text-input{
            width:100%;
            padding:12px;
            border:1px solid #dfe4ea;
            border-radius:6px;
            font-size:0.95em;
            box-sizing:border-box;
            font-family:inherit;
        }

        .text-input:focus{
            outline:2px solid var(--accent);
            border-color:transparent;
        }

        .btn-row{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .btn.secondary{
            background:transparent;
            color:var(--primary);
            border:1px solid var(--primary);
        }

        .btn.secondary:hover{
            background:#f1f2f6;
        }

        .tools{
            display:flex;
            justify-content:flex-end;
            gap:10px;
            margin-top:10px;
        }

        .tool-btn{
            background:none;
            border:1px solid #b2bec3;
            color:#636e72;
            padding:4px 10px;
            border-radius:4px;
            font-size:0.8em;
            cursor:pointer;
        }

        .tool-btn:hover{
            background:#f1f2f6;
            color:var(--primary);
        }

        .room-info{
            text-align:center;
            font-size:0.8em;
            color:var(--accent);
            margin-bottom:15px;
            font-weight:bold;
        }

        .channel-card{
            border:1px solid #dfe4ea;
            border-radius:10px;
            background:#fafbfc;
            padding:12px;
            margin-bottom:15px;
        }

        .channel-row{
            display:grid;
            grid-template-columns:110px 1fr auto;
            gap:10px;
            align-items:center;
        }

        .channel-room-input{
            text-align:center;
            font-weight:700;
            color:var(--accent);
            background:#f1f6fb;
        }

        .mono-panel{
            background:#f1f2f6;
            color:#2d3436;
            font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,"Liberation Mono","Courier New",monospace;
        }

        .field-note{
            margin-top:8px;
            font-size:12px;
            color:#636e72;
            line-height:1.5;
        }

        .bottom-nav{
            display:flex;
            justify-content:space-around;
            gap:6px;
            padding:8px 10px;
            border-top:1px solid #dfe4ea;
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(8px);
        }

        .nav-btn{
            flex:1;
            background:transparent;
            border:none;
            cursor:pointer;
            padding:6px 0;
            border-radius:10px;
            display:flex;
            flex-direction:column;
            gap:4px;
            align-items:center;
            justify-content:center;
            color:#636e72;
            font-size:10px;
            user-select:none;
        }

        .nav-btn:hover{
            background:#f1f2f6;
            color:var(--primary);
        }

        .nav-icon{
            font-size:18px;
            line-height:18px;
        }

        .panel-backdrop{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.35);
            z-index:999;
            display:none;
        }

        .side-panel{
            position:fixed;
            z-index:1000;
            left:50%;
            transform:translateX(-50%);
            bottom:0;
            width:min(520px,100vw);
            max-height:78vh;
            background:var(--card);
            border-radius:14px 14px 0 0;
            box-shadow:0 -12px 30px rgba(0,0,0,0.22);
            display:none;
            overflow:hidden;
        }

        .panel-header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:12px 14px;
            border-bottom:1px solid #dfe4ea;
            background:#fafbfc;
        }

        .panel-title{
            font-weight:700;
            color:var(--primary);
            font-size:0.95em;
        }

        .panel-close{
            background:transparent;
            border:none;
            font-size:20px;
            line-height:20px;
            cursor:pointer;
            color:#636e72;
            padding:6px 10px;
            border-radius:10px;
        }

        .panel-close:hover{
            background:#f1f2f6;
            color:var(--primary);
        }

        .panel-body{
            padding:14px;
            overflow:auto;
            max-height:calc(78vh - 52px);
        }

        .panel-section{
            border:1px solid #edf0f3;
            border-radius:10px;
            padding:12px;
            margin-bottom:12px;
            background:#fff;
        }

        .panel-section-title{
            font-size:0.85em;
            font-weight:800;
            color:var(--primary);
            margin-bottom:8px;
        }

        .mono{
            font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,"Liberation Mono","Courier New",monospace;
            font-size:12px;
            background:#f6f8fa;
            border:1px solid #e9ecef;
            padding:10px;
            border-radius:10px;
            white-space:pre-wrap;
            word-break:break-all;
        }

        .pill{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:4px 10px;
            border-radius:999px;
            font-size:12px;
            border:1px solid #dfe4ea;
            background:#fafafa;
            color:#636e72;
        }

        .pill.ok{
            border-color:rgba(46,204,113,0.35);
            background:rgba(46,204,113,0.08);
            color:#1f7a41;
        }

        .pill.bad{
            border-color:rgba(231,76,60,0.35);
            background:rgba(231,76,60,0.08);
            color:#a3342a;
        }
    </style>
</head>
