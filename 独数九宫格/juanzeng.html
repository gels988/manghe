<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>私人捐赠 - G-Gas充值系统</title>
    <script src="js/db_client.js"></script>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 40px;
        }
        
        /* 警告横幅 - 强调无经济价值 */
        .warning-banner {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #ff6b6b;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            animation: pulse 2s infinite;
            line-height: 1.6;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(255, 75, 43, 0.7); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 26px;
            color: #ffd700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .header .subtitle {
            font-size: 13px;
            color: #a0a0a0;
        }
        
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(255, 75, 75, 0.8);
            transform: translateY(-2px);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* GAS余额显示 */
        .gas-display {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,215,0,0.05) 100%);
            border-radius: 12px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .gas-label {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 10px;
        }
        
        .gas-amount {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }
        
        .gas-unit {
            font-size: 16px;
            color: #ffd700;
            opacity: 0.8;
        }
        
        /* 钱包区域 */
        .wallet-section {
            text-align: center;
        }
        
        .qr-container {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .qr-container img {
            width: 220px;
            height: 220px;
            display: block;
        }
        
        .wallet-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .wallet-address {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #ffd700;
            word-break: break-all;
            margin-bottom: 10px;
            border: 1px dashed rgba(255,215,0,0.3);
        }
        
        .copy-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }
        
        .network-tag {
            display: inline-block;
            background: #627eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        /* 奖励政策表格 */
        .reward-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .reward-table th {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 12px;
            text-align: left;
            font-size: 13px;
        }
        
        .reward-table td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
        
        .reward-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .tier-range {
            font-weight: bold;
            color: #fff;
        }
        
        .tier-multiplier {
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
        }
        
        .tier-highlight {
            background: rgba(233, 69, 96, 0.15) !important;
            border-left: 4px solid #e94560;
        }
        
        .tier-highlight .tier-range {
            color: #ffd700;
        }
        
        .recommended-badge {
            background: #e94560;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        /* 捐赠操作区 */
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
        }
        
        .estimate-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .estimate-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .estimate-value {
            font-size: 36px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .note {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            line-height: 1.5;
        }
        
        /* 记录列表 */
        .record-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #627eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .record-amount { font-weight: bold; color: #ffd700; }
        .record-gas { color: #00cc66; font-weight: bold; }
        .record-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-pending { background: #ff9800; color: #000; }
        .status-completed { background: #00cc66; color: #fff; }
        .status-rejected { background: #ff4444; color: #fff; }
        
        .record-time {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        
        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.3);
            z-index: 9999;
            transition: transform 0.3s;
            text-align: center;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .notification.success { border-color: #00cc66; color: #00cc66; }
        .notification.error { border-color: #ff4444; color: #ff4444; }
        
        .hidden { display: none; }
        .header-user-meta {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        .wallet-address-spaced {
            margin-top: 12px;
        }
        .referral-warning-note {
            margin-top: 15px;
            color: #ff6b6b;
            text-align: center;
        }
        .payment-method-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #0f3460;
            border: 1px solid #533483;
            color: #fff;
        }
        .mono-input {
            font-family: monospace;
        }
        .estimate-subnote {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        .tier-highlight-text {
            color: #ffd700;
        }
        .estimate-box-tight-top {
            margin-top: 14px;
        }
        .stack-top-gap {
            margin-top: 10px;
        }
        .activation-code-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.35);
            background: rgba(0,0,0,0.25);
            color: #fff;
            font-family: monospace;
            box-sizing: border-box;
        }
        .submit-btn-success {
            margin-top: 10px;
            background: linear-gradient(135deg,#00cc66 0%,#00e676 100%);
        }
        .submit-btn-warning {
            margin-top: 10px;
            background: linear-gradient(135deg,#ffd700 0%,#ffb300 100%);
            color: #000;
        }
        .note-top-gap {
            margin-top: 10px;
        }
        .note-centered {
            text-align: center;
            margin-top: 15px;
        }
        .history-hidden {
            display: none;
        }
        .record-side {
            text-align: right;
        }
        
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .qr-container img { width: 180px; height: 180px; }
        }
    </style>
    <script src="js/shared_identity.js"></script>
</head>
