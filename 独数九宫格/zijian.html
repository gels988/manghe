<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>系统自检中心 - 三层架构验证</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
      color: #fff;
      font-family: 'Microsoft YaHei', sans-serif;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #e94560 0%, #d43f57 100%);
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .header p {
      font-size: 1.2em;
      opacity: 0.9;
    }
    .check-item {
      padding: 20px;
      margin: 15px 0;
      background: rgba(22, 33, 62, 0.8);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid #533483;
      transition: all 0.3s ease;
    }
    .check-item:hover {
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .check-pass {
      background: linear-gradient(135deg, #00cc66 0%, #00a854 100%);
      border-left-color: #00cc66;
    }
    .check-fail {
      background: linear-gradient(135deg, #ff4444 0%, #e63946 100%);
      border-left-color: #ff4444;
    }
    .check-warn {
      background: linear-gradient(135deg, #ffaa00 0%, #ff9100 100%);
      border-left-color: #ffaa00;
    }
    .check-item .details {
      font-size: 0.85em;
      opacity: 0.8;
      margin-top: 5px;
      max-width: 500px;
      line-height: 1.4;
    }
    .check-item .actions {
      margin-top: 8px;
    }
    .check-item .action-btn {
      padding: 4px 12px;
      margin-right: 8px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 0.75em;
      transition: all 0.2s;
    }
    .check-item .action-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    .diagnostic-report {
      background: rgba(15, 52, 96, 0.9);
      padding: 25px;
      border-radius: 12px;
      margin-top: 25px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      line-height: 1.6;
      border: 1px solid #533483;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    .diagnostic-report::before {
      content: "📋 诊断日志";
      display: block;
      color: #e94560;
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 1.1em;
    }
    .btn {
      padding: 15px 35px;
      background: linear-gradient(135deg, #e94560 0%, #d43f57 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 15px 10px 15px 0;
      font-size: 1.1em;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(233, 69, 96, 0.6);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #533483 0%, #4a2d75 100%);
    }
    .btn-success {
      background: linear-gradient(135deg, #00cc66 0%, #00a854 100%);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .status-bar {
      background: rgba(22, 33, 62, 0.9);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: center;
      font-size: 1.1em;
      border: 2px solid #533483;
    }
    .status-ok { color: #00cc66; font-weight: bold; }
    .status-error { color: #ff4444; font-weight: bold; }
    .status-warn { color: #ffaa00; font-weight: bold; }
    .status-info { color: #00ccff; font-weight: bold; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .loading {
      animation: pulse 1.5s infinite;
      color: #e94560;
    }
    .comm-status {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .comm-connected { background: #00cc66; box-shadow: 0 0 8px #00cc66; }
    .comm-disconnected { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
    .comm-pending { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
    
    .auto-fix-panel {
      background: rgba(0, 204, 102, 0.1);
      border: 1px solid #00cc66;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      display: none;
    }
    .auto-fix-panel.active {
      display: block;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .metric-value {
      font-family: 'Consolas', monospace;
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .fix-log {
      margin-top: 10px;
      font-size: 0.9em;
    }
    .diagnostic-report-spaced {
      margin-top: 20px;
    }
    .action-center {
      text-align: center;
      margin-top: 20px;
    }
    .btn-hidden {
      display: none;
    }
    .feature-note-box {
      text-align: center;
      margin-top: 30px;
      padding: 20px;
      background: rgba(22, 33, 62, 0.5);
      border-radius: 10px;
    }
    .feature-note-text {
      color: #aaa;
      font-size: 0.9em;
    }
  </style>
    <script src="js/db_client.js"></script>
    <script src="js/shared_identity.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 系统自检中心</h1>
      <p>三层架构 · 数学自洽验证 · 智能修复 · 闭环运行</p>
    </div>
    
    <div class="status-bar" id="status">
      <span class="comm-status comm-pending"></span>
      <span class="loading">🔄 等待主系统连接...</span>
    </div>
    
    <div id="checks">
      <div class="check-item">
        <span>⏳ 等待执行自检...</span>
      </div>
    </div>
    
    <div class="auto-fix-panel" id="autoFixPanel">
      <strong>🔧 自动修复状态：</strong>
      <div id="fixLog" class="fix-log"></div>
    </div>

    <div class="diagnostic-report diagnostic-report-spaced" id="unifiedReportBox">
[INFO] 统一本地自检报告读取中...
    </div>
    
    <div class="diagnostic-report" id="report">
[INFO] 系统自检中心已加载
[INFO] 当前时间: ${new Date().toLocaleString('zh-CN')}
[INFO] 运行模式: 智能通讯模式（支持自我修复）
[INFO] 
[INFO] 点击"执行完整自检"按钮开始检查系统状态
    </div>
    
    <div class="action-center">
      <button class="btn" type="button" id="btnCheck">🚀 执行完整自检</button>
      <button class="btn btn-success btn-hidden" type="button" id="btnFix">🔧 一键修复</button>
      <button class="btn btn-secondary" type="button" id="btnCommTest">📡 测试通讯</button>
      <button class="btn btn-secondary" type="button" id="btnSystemInfo">📊 系统信息</button>
      <button class="btn btn-secondary" type="button" id="btnLoadUnified">🧾 读取统一本地报告</button>
      <button class="btn btn-secondary" type="button" id="btnClearReport">🗑️ 清空日志</button>
      <button class="btn btn-secondary" type="button" id="btnCloseSelfCheck">✕ 关闭窗口</button>
    </div>
    
    <div class="feature-note-box">
      <p class="feature-note-text">
        💡 <strong>智能自检特性：</strong><br>
        • 自动检测与主系统的通讯状态 • 支持 4 项核心功能自检<br>
        • 发现问题自动尝试修复 • 闭环运行确保自洽
      </p>
    </div>
  </div>

  <script src="js/zijian.page.js"></script>
</body>
</html>
